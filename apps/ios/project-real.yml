# REAL-CORE spec: the demo base (project.yml) + the gitignored project.local.yml
# (which supplies the injected PPQ_API_KEY build setting), plus the MurmurCoreFFI
# package dependency that flips `#if canImport(MurmurCoreFFI)` on and activates
# the real murmur-core engine.
#
# Generated by ./generate.sh (which first writes project.local.yml from .env).
# Do NOT run `xcodegen generate --spec project-real.yml` directly unless
# project.local.yml already exists — the include below requires it. For a
# zero-setup demo build, use bare `xcodegen generate` (project.yml) instead.
#
# xcodegen deep-merges includes with this file taking precedence, so the
# SitewalkGallery target keeps its type/sources/Info from project.yml and gains
# the dependency below.
include:
  - path: project.yml
  - path: project.local.yml
name: SitewalkGallery
packages:
  MurmurCoreFFI:
    path: Packages/MurmurCoreFFI
targets:
  SitewalkGallery:
    dependencies:
      - package: MurmurCoreFFI
