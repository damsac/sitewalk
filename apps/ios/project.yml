name: SitewalkGallery
options:
  bundleIdPrefix: com.damsac
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
targets:
  SitewalkGallery:
    type: application
    platform: iOS
    sources:
      - Sources
    info:
      path: Sources/App/Info.plist
      properties:
        CFBundleDisplayName: Sitewalk
        UILaunchScreen: {}
        NSMicrophoneUsageDescription: "Sitewalk records your walk-and-talk so it can turn it into paperwork."
        NSSpeechRecognitionUsageDescription: "Sitewalk transcribes your walk on-device to build your document."
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIAppFonts:
          - Barlow-Regular.ttf
          - Barlow-Medium.ttf
          - Barlow-SemiBold.ttf
          - Barlow-Bold.ttf
          - Barlow-ExtraBold.ttf
          - BarlowSemiCondensed-Medium.ttf
          - BarlowSemiCondensed-SemiBold.ttf
          - IBMPlexMono-Regular.ttf
          - IBMPlexMono-Medium.ttf
          - IBMPlexMono-SemiBold.ttf
          - SourceSerif4-SemiBold.ttf
          - SourceSerif4-Bold.ttf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.damsac.sitewalk.gallery
        CODE_SIGNING_ALLOWED: "NO"
        TARGETED_DEVICE_FAMILY: "1"
